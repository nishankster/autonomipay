version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ach-rtp-postgres
    environment:
      POSTGRES_DB: ach_rtp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ach-rtp-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ach-to-rtp-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ach-to-rtp-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5433/ach_rtp_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5673
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      LOG_LEVEL: INFO
      DEBUG: "False"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  default:
    name: ach-rtp-network
