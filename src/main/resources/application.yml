spring:
  application:
    name: ach-to-rtp-service
  
  # JPA/Database Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    show-sql: false
    open-in-view: false
  
  datasource:
    url: jdbc:postgresql://localhost:5432/ach_rtp_db
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  
  # RabbitMQ Configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
  
  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024

# Logging Configuration
logging:
  level:
    root: INFO
    com.example.ach2rtp: DEBUG
    org.springframework.web: INFO
    org.springframework.amqp: INFO
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ach-to-rtp-service.log
    max-size: 10MB
    max-history: 30

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Application-Specific Configuration
ach:
  max-file-size: 10485760  # 10 MB
  max-entries-per-batch: 10000
  max-batches-per-file: 100

rtp:
  message-timeout-ms: 30000
  schema-validation-enabled: true
  currency-code: USD

mq:
  exchange-name: rtp-gateway
  routing-key: rtp.credit.transfer
  retry-max-attempts: 3
  retry-backoff-ms: 1000
  dead-letter-queue-enabled: true

file-storage:
  upload-directory: /tmp/ach-uploads
  archive-directory: /tmp/ach-archive
  max-file-age-days: 30
